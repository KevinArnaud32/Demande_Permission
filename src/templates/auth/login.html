<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Connexion | Gestion RH
    </title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                linear-gradient(
                    rgba(0,0,0,0.55),
                    rgba(0,0,0,0.55)
                ),
                url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;

            font-family:'Segoe UI', sans-serif;
        }

        .login-card{

            width:420px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(12px);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:25px;

            padding:40px;

            color:white;

            box-shadow:
                0 8px 32px rgba(0,0,0,0.3);

            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{

            width:80px;
            height:80px;

            object-fit:contain;

            margin-bottom:15px;
        }

        .title{

            font-size:28px;
            font-weight:700;

            margin-bottom:5px;
        }

        .subtitle{

            font-size:14px;

            color:#dcdcdc;

            margin-bottom:30px;
        }

        .form-control{

            height:50px;

            border-radius:12px;

            border:none;

            padding-left:45px;

            background:rgba(255,255,255,0.15);

            color:white;
        }

        .form-control::placeholder{
            color:#e9e9e9;
        }

        .form-control:focus{

            background:rgba(255,255,255,0.2);

            box-shadow:none;

            color:white;
        }

        .input-group-text{

            border:none;

            background:transparent;

            color:white;

            position:absolute;

            z-index:10;

            height:50px;
        }

        .input-group{
            position:relative;
        }

        .btn-login{

            height:50px;

            border-radius:12px;

            background:#0d6efd;

            border:none;

            font-weight:600;

            transition:0.3s;
        }

        .btn-login:hover{

            background:#0b5ed7;

            transform:translateY(-2px);
        }

        .footer-text{

            text-align:center;

            margin-top:20px;

            font-size:13px;

            color:#e2e2e2;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="text-center">

        <img
            src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
            class="logo"
            alt="Logo"
        >

        <h1 class="title">
            Gestion RH
        </h1>

        <p class="subtitle">
            Connectez-vous à votre espace
        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-person-fill"></i>
                </span>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Nom utilisateur"
                >

            </div>

        </div>

        <div class="mb-4">

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock-fill"></i>
                </span>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Mot de passe"
                >

            </div>

        </div>

        <button class="btn btn-login w-100">

            <i class="bi bi-box-arrow-in-right"></i>

            Connexion

        </button>

    </form>

    <div class="footer-text">

        Application de gestion des permissions et congés

    </div>

</div>

</body>

</html>
