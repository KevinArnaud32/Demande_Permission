{% extends 'base/base.html' %}

{% block title %}
Nouvelle demande de congé
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body p-5">

                    <!-- HEADER -->
                    <div class="text-center mb-5">

                        <div
                            class="mx-auto mb-3 d-flex justify-content-center align-items-center rounded-circle bg-success text-white"
                            style="
                                width:80px;
                                height:80px;
                                font-size:30px;
                            "
                        >

                            <i class="bi bi-calendar-check-fill"></i>

                        </div>

                        <h2 class="fw-bold">

                            Nouvelle demande de congé

                        </h2>

                        <p class="text-muted">

                            Remplissez les informations de votre demande de congé

                        </p>

                    </div>

                    <!-- FORM -->
                    <form method="POST">

                        {% csrf_token %}

                        <!-- DATE DEBUT -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Date de début

                            </label>

                            {{ conges_form.date_debut }}

                        </div>

                        <!-- NOMBRE DE JOURS -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Nombre de jours

                            </label>

                            {{ conges_form.nombre_jours }}

                        </div>


                        <!-- BUTTONS -->
                        <div class="d-flex justify-content-end gap-3">

                            <a
                                href="{% url 'conge_list' %}"
                                class="btn btn-light border px-4 py-2 rounded-3"
                            >

                                Annuler

                            </a>

                            <button
                                type="submit"
                                class="btn btn-success px-4 py-2 rounded-3"
                            >

                                <i class="bi bi-send"></i>

                                Envoyer la demande

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
