{% extends 'base/base.html' %}

{% block title %}
Dashboard RH
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="mb-4">

        <h2 class="fw-bold">
            Dashboard RH
        </h2>

        <p class="text-muted">
            Gestion des validations RH
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body text-center">

                    <i class="bi bi-check2-circle fs-1 text-success"></i>

                    <h5 class="mt-3">
                        Permissions validées
                    </h5>

                    <h2 class="fw-bold">
                        35
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body text-center">

                    <i class="bi bi-clock-history fs-1 text-warning"></i>

                    <h5 class="mt-3">
                        En attente
                    </h5>

                    <h2 class="fw-bold">
                        12
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body text-center">

                    <i class="bi bi-x-circle fs-1 text-danger"></i>

                    <h5 class="mt-3">
                        Refusées
                    </h5>

                    <h2 class="fw-bold">
                        5
                    </h2>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
