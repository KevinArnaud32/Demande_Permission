{% extends 'base/base.html' %}

{% block title %}
Dashboard Employé
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="mb-4">

        <h2 class="fw-bold">
            Dashboard Employé
        </h2>

        <p class="text-muted">
            Suivi de vos demandes RH
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body text-center">

                    <i class="bi bi-send-check fs-1 text-primary"></i>

                    <h5 class="mt-3">
                        Mes demandes
                    </h5>

                    <h2 class="fw-bold">
                        10
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body text-center">

                    <i class="bi bi-check-circle fs-1 text-success"></i>

                    <h5 class="mt-3">
                        Acceptées
                    </h5>

                    <h2 class="fw-bold">
                        6
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body text-center">

                    <i class="bi bi-clock fs-1 text-warning"></i>

                    <h5 class="mt-3">
                        En attente
                    </h5>

                    <h2 class="fw-bold">
                        4
                    </h2>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
