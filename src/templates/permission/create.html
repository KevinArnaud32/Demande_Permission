{% extends 'base/base.html' %}

{% block title %}
Nouvelle permission
{% endblock %}

{% block content %}

<div class="custom-card">

    <fieldset class="scheduler-border">

        <div class="d-flex justify-content-between align-items-center mb-4">

                <h3>
                    Nouvelle permission
                </h3>

                <a href="{% url 'permission_list' %}" class="btn btn-secondary" >
                    Retour
                </a>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        Motif
                    </label>

                    {{ permission_form.motif }}

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        Heure sortie
                    </label>

                    {{ permission_form.heure_sortie }}

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        Durée (minutes)
                    </label>

                    {{ permission_form.nombre_minute }}

                </div>

            </div>

            <button class="btn btn-primary">

                Enregistrer

            </button>

        </form>

    </fieldset>

</div>

{% endblock %}
